<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankFlow | Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-box">
    <h1>BankFlow</h1>
    <h2>Регистрация</h2>

    <input id="regName" type="text" placeholder="Имя">
    <input id="regSurname" type="text" placeholder="Фамилия">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPhone" type="text" placeholder="Телефон">
    <input id="regPassword" type="password" placeholder="Пароль">
    <input id="regConfirmPassword" type="password" placeholder="Повтор пароля">

    <button id="registerBtn">Зарегистрироваться</button>
    <p id="registerMessage"></p>

    <a href="login.html">Уже есть аккаунт? Войти</a>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
